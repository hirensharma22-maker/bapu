<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bapu WebAR - Hiren Sharma</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="pattern-marker.patt">
        <a-entity 
          position="0 0.5 0" 
          rotation="-90 0 0"
          text="value: Matrubhasha ma Shikshan; color: #FF5733; align: center; width: 4;">
        </a-entity>
        <a-box position='0 0.5 0' material='opacity: 0.5; color: yellow;'></a-box>
      </a-marker>

      <a-marker preset="hiro">
        <a-box position='0 0.5 0' material='color: blue;'></a-box>
        <a-text value="Bapu AR Live" position="0 1.2 0" align="center" rotation="-90 0 0"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
