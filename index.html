<!DOCTYPE html>
<html lang="gu">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Bapu 3D AR Experience</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; renderingContext: 'webgl2'">
      
      <a-assets>
        <a-asset-item id="gandhiji-model" src="https://cdn.glitch.me/331a9829-17d4-42f5-93df-5c5f850e029c%2FGandhiji%20Model.glb?v=1680123456789"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-marker.patt">
        
        <a-entity 
          gltf-model="#gandhiji-model" 
          scale="1.5 1.5 1.5" 
          position="0 0.2 0" 
          rotation="-90 0 0"
          animation-mixer> </a-entity>
        
        <a-text value="Matrubhasha ma Shikshan" color="#D32F2F" position="-1 0.7 0" rotation="-90 0 0" width="6" align="center"></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
